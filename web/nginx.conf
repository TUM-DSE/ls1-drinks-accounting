server {
    listen       80;
    listen  [::]:80;
    server_name  localhost;

    root   /usr/share/nginx/html;

    location ^~ /web/_app/ {
        alias /usr/share/nginx/html/_app/;
        try_files $uri =404;
    }

    location = /web {
        try_files /index.html =404;
    }

    location ^~ /web/ {
        rewrite ^/web/(.*)$ /$1 break;
        try_files $uri $uri/ /index.html;
    }

    location ^~ /_app/ {
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
    }
}
